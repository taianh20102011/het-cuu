<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế Hoạch Chinh Phục Kỳ Thi Tuyển Sinh 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: -webkit-linear-gradient(45deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item label {
            cursor: pointer;
            display: flex;
            align-items: center;
            width: 100%;
            font-size: 0.95rem;
        }

        .task-item input[type="checkbox"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            margin-right: 12px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .task-item input[type="checkbox"]:checked {
            background-color: var(--success);
            border-color: var(--success);
        }

        .task-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-item input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 1.5rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #334155;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            font-weight: 600;
        }

        #toast.show {
            bottom: 30px;
        }

        .weekend-badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 10px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Chiến Dịch Lên Cấp 3 🚀</h1>
            <p class="subtitle" id="current-date">Hôm nay: ...</p>
        </header>

        <div class="card">
            <h2>🎯 Mục tiêu hằng ngày</h2>
            <ul class="task-list" id="daily-tasks">
                <li class="task-item">
                    <label>
                        <input type="checkbox" data-id="task1">
                        <span>Giải 1 bài Hình học (Hoàn thành trọn vẹn câu b, c)</span>
                    </label>
                </li>
                <li class="task-item">
                    <label>
                        <input type="checkbox" data-id="task2">
                        <span>Ngữ Văn: Học 1 Mở bài, 1 Kết bài & Bằng chứng</span>
                    </label>
                </li>
                <li class="task-item">
                    <label>
                        <input type="checkbox" data-id="task3">
                        <span>Ngoại ngữ: Nâng cao 10 từ vựng & 1 cấu trúc ngữ pháp</span>
                    </label>
                </li>
            </ul>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
        </div>

        <div class="card" id="weekend-card">
            <h2>🔥 Thử thách Cuối Tuần <span class="weekend-badge">T7 & CN</span></h2>
            <ul class="task-list" id="weekend-tasks">
                <li class="task-item">
                    <label>
                        <input type="checkbox" data-id="task4">
                        <span>Giải 1 đề Toán hoàn chỉnh (Canh đúng 120 phút)</span>
                    </label>
                </li>
                <li class="task-item">
                    <label>
                        <input type="checkbox" data-id="task5">
                        <span>Giải 1 đề Văn hoàn chỉnh (Canh đúng 120 phút)</span>
                    </label>
                </li>
                <li class="task-item">
                    <label>
                        <input type="checkbox" data-id="task6">
                        <span>Giải 1 đề Anh hoàn chỉnh (Canh đúng 60/90 phút)</span>
                    </label>
                </li>
            </ul>
        </div>
    </div>

    <div id="toast">Thông báo hằng ngày</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const progressBar = document.getElementById('progress');
            const dateDisplay = document.getElementById('current-date');
            const weekendCard = document.getElementById('weekend-card');
            
            // Xử lý Ngày tháng & Hiển thị Thử thách cuối tuần
            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = today.toLocaleDateString('vi-VN', options);
            dateDisplay.textContent = `Hôm nay: ${dateString}`;

            const dayOfWeek = today.getDay(); // 0 là Chủ Nhật, 6 là Thứ 7
            if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                weekendCard.style.opacity = '0.5';
                weekendCard.style.pointerEvents = 'none'; // Khóa lại nếu không phải cuối tuần
                document.querySelector('.weekend-badge').textContent = 'Chưa đến lúc';
                document.querySelector('.weekend-badge').style.background = '#64748b';
            }

            // Hệ thống Lưu trữ LocalStorage
            const storedDate = localStorage.getItem('lastVisitedDate');
            const currentDateKey = today.toDateString();

            // Nếu qua ngày mới, reset toàn bộ checkbox
            if (storedDate !== currentDateKey) {
                localStorage.clear();
                localStorage.setItem('lastVisitedDate', currentDateKey);
                showToast("☀️ Chào ngày mới! Bắt đầu chuỗi nhiệm vụ hôm nay nào!");
            } else {
                showToast("👋 Mừng bạn quay lại! Tiếp tục cố gắng nhé.");
            }

            // Load trạng thái checkbox
            checkboxes.forEach(box => {
                const isChecked = localStorage.getItem(box.dataset.id) === 'true';
                box.checked = isChecked;
                
                box.addEventListener('change', () => {
                    localStorage.setItem(box.dataset.id, box.checked);
                    updateProgress();
                    
                    if(box.checked) {
                        showToast("✨ Tuyệt vời! Bạn vừa hoàn thành 1 mục tiêu.");
                    }
                });
            });

            // Cập nhật thanh tiến độ (Chỉ tính daily tasks vào ngày thường)
            function updateProgress() {
                const dailyCheckboxes = document.querySelectorAll('#daily-tasks input[type="checkbox"]');
                const checkedCount = Array.from(dailyCheckboxes).filter(b => b.checked).length;
                const percentage = (checkedCount / dailyCheckboxes.length) * 100;
                progressBar.style.width = `${percentage}%`;

                if(percentage === 100) {
                    setTimeout(() => showToast("🏆 Chúc mừng! Bạn đã hoàn thành xuất sắc mục tiêu ngày hôm nay!"), 500);
                }
            }

            // Quản lý hiển thị Toast Notification
            let toastTimeout;
            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3500);
            }

            // Cấp quyền nhận thông báo của Trình duyệt (Tùy chọn)
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted" && storedDate !== currentDateKey) {
                        new Notification("Kế hoạch học tập 📚", {
                            body: "Đừng quên giải bài Hình học và học từ vựng hôm nay nhé!",
                            icon: "https://cdn-icons-png.flaticon.com/512/3143/3143606.png"
                        });
                    }
                });
            }

            updateProgress();
        });
    </script>
</body>
</html>
