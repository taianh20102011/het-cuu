<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Khảo sát Hứng thú Nghề nghiệp</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f8fc;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
    }
    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
    }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #f9f9f9;
      box-sizing: border-box;
    }
    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23666" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px 16px;
    }
    textarea {
      resize: vertical;
      height: 80px;
    }
    button {
      margin-top: 20px;
      padding: 12px 20px;
      background-color: #2980b9;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #1c5980;
    }
    table {
      margin-top: 30px;
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background-color: #ecf0f1;
    }
    #resultsSection {
      display: none;
      margin-top: 50px;
    }
    #devButton {
      background-color: #27ae60;
      margin-left: auto;
      margin-top: 10px;
    }
    #devButton:hover {
      background-color: #1e8449;
    }
    .dev-btn-wrapper {
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Khảo sát Hứng thú Nghề nghiệp</h2>
    <form id="surveyForm">
      <label for="name">Họ và tên:</label>
      <input type="text" id="name" required>

      <label for="class">Lớp:</label>
      <select id="class" required>
        <option value="">-- Chọn lớp --</option>
        <option value="8/1">8/1</option>
        <option value="8/2">8/2</option>
        <option value="8/3">8/3</option>
        <option value="8/4">8/4</option>
        <option value="8/5">8/5</option>
        <option value="8/6">8/6</option>
        <option value="8/7">8/7</option>
        <option value="8/8">8/8</option>
        <option value="8/9">8/9</option>
        <option value="8/10">8/10</option>
        <option value="8/11">8/11</option>
      </select>

      <label for="interest">Bạn có hứng thú với nghề nghiệp nào? Vì sao?</label>
      <textarea id="interest" required></textarea>

      <label for="actions">Bạn đã làm những gì để thể hiện hứng thú với nghề nghiệp bạn yêu thích?</label>
      <textarea id="actions" required></textarea>

      <label for="subject">Trong các môn học, bạn thích nhất hoặc học tốt nhất môn học nào?</label>
      <textarea id="subject" required></textarea>

      <label for="activities">Bạn thường hào hứng, say mê với những hoạt động hoặc công việc nào?</label>
      <textarea id="activities" required></textarea>

      <label for="traits">Bạn thấy nét tính cách nào của bạn phù hợp với nghề nghiệp bạn hứng thú?</label>
      <textarea id="traits" required></textarea>

      <button type="submit">Gửi</button>

      <!-- Nút nhà phát triển được đặt sau nút Gửi -->
      <div class="dev-btn-wrapper">
        <button id="devButton" type="button">🔒 Dành cho nhà phát triển</button>
      </div>
    </form>

    <!-- Vùng chứa bảng kết quả -->
    <div id="resultsSection">
      <h2>Dữ liệu đã nhận</h2>
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Họ tên</th>
            <th>Lớp</th>
            <th>Nghề nghiệp & lý do</th>
            <th>Hành động thể hiện</th>
            <th>Môn học yêu thích</th>
            <th>Hoạt động say mê</th>
            <th>Tính cách phù hợp</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dữ liệu sẽ hiển thị ở đây -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const KEY_ACCESS = "To-ba-phat-hanh-tam-4"; // Mã key bảo mật
  
    document.getElementById('surveyForm').addEventListener('submit', function(e) {
      e.preventDefault();
  
      const name = document.getElementById('name').value;
      const userClass = document.getElementById('class').value;
      const interest = document.getElementById('interest').value;
      const actions = document.getElementById('actions').value;
      const subject = document.getElementById('subject').value;
      const activities = document.getElementById('activities').value;
      const traits = document.getElementById('traits').value;
  
      // Gửi dữ liệu về server trên Replit
      fetch("https://replit.com/@phamngoctaianh6/GrumpyTomatoFirewall.replit.app/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name,
          class: userClass,
          interest,
          actions,
          subject,
          activities,
          traits
        })
      })
      .then(response => {
        if (response.ok) {
          alert("Dữ liệu đã được gửi và lưu!");
          document.getElementById("surveyForm").reset();
        } else {
          alert("Lỗi khi gửi dữ liệu!");
        }
      })
      .catch(error => {
        console.error("Lỗi mạng:", error);
        alert("Không thể kết nối đến máy chủ.");
      });
    });
  
    document.getElementById("devButton").addEventListener("click", function() {
      const inputKey = prompt("Vui lòng nhập mã truy cập:");
      if (inputKey === KEY_ACCESS) {
        document.getElementById("resultsSection").style.display = "block";
        alert("Truy cập thành công!");
      } else {
        alert("Mã truy cập sai!");
      }
    });
  </script>
  

</body>
</html>
